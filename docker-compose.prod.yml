services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zenda}
      POSTGRES_USER: ${POSTGRES_USER:-zenda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zenda}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          memory: 256M

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: always
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-zenda}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zenda}
      DATABASE_SSL: "true"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}
      API_PORT: 3001
      APP_URL: ${APP_URL:-https://zenda.bot}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ADMIN_SECRET: ${ADMIN_SECRET:?Set ADMIN_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_LOCAL_SOLO_MONTHLY: ${STRIPE_PRICE_LOCAL_SOLO_MONTHLY:-}
      STRIPE_PRICE_LOCAL_STARTER_MONTHLY: ${STRIPE_PRICE_LOCAL_STARTER_MONTHLY:-}
      STRIPE_PRICE_LOCAL_PRO_MONTHLY: ${STRIPE_PRICE_LOCAL_PRO_MONTHLY:-}
      STRIPE_PRICE_LOCAL_BUSINESS_MONTHLY: ${STRIPE_PRICE_LOCAL_BUSINESS_MONTHLY:-}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    restart: always
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
  redisdata:
