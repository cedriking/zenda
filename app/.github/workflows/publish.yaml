name: Publish Desktop App

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            maker: dmg
          - os: windows-latest
            maker: squirrel
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build workspace packages
        run: npx turbo build --filter=@zenda/shared --filter=@zenda/db

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Make and Publish (${{ matrix.maker }})
        working-directory: app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish
