name: Publish Desktop App

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: false
        type: string

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            maker: dmg
          - os: windows-latest
            maker: squirrel
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build workspace packages
        run: npx turbo build --filter=@zenda/shared --filter=@zenda/db

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Make and Publish (${{ matrix.maker }})
        working-directory: app
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_UPDATES_BUCKET }}
        run: npm run publish
