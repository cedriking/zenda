<!doctype html>
<!--biome-ignore lint/a11y/useHtmlLang: Can't specify a language, since i18n handles internationalization -->
<html>
  <head>
    <meta charset="UTF-8">
    <title>Zenda</title>
    <link rel="stylesheet" href="/src/styles/global.css">
    <style>
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: oklch(0.985 0 0);
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash-logo {
        width: 96px;
        height: 96px;
        margin-bottom: 24px;
        animation: splash-pulse 1.8s ease-in-out infinite;
      }
      #splash-spinner {
        width: 28px;
        height: 28px;
        border: 3px solid oklch(0.922 0 0);
        border-top-color: oklch(0.6969 0.1701 162.48);
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.04); opacity: 0.85; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img id="splash-logo" src="/zenda-splash-logo.png" alt="Zenda">
      <div id="splash-spinner"></div>
    </div>
    <div id="app" />
    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
