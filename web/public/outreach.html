const STORAGE_KEY = 'zenda-outreach-sent';

function getSent() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}

function saveSent(sent) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sent));
}

function updateProgress() {
  const sent = getSent();
  const count = sent.length;
  document.getElementById('counter').textContent = count;
  document.getElementById('bar').style.width = `${(count / prospects.length) * 100}%`;
}

function render() {
  const sent = getSent();
  const container = document.getElementById('cards');
  container.innerHTML = '';

  prospects.forEach((p, i) => {
    const isSent = sent.includes(i);
    const card = document.createElement('div');
    card.className = `card${isSent ? ' sent' : ''}`;
    card.innerHTML = `
      <div class="top">
        <span class="name">${i + 1}. ${p.name}</span>
        <span class="status-badge ${isSent ? 'status-sent' : 'status-pending'}">${isSent ? 'Enviado' : 'Pendiente'}</span>
      </div>
      <div class="location">${p.location}</div>
      <div class="notes">${p.vertical} — ${p.notes}</div>
      ${!isSent ? `<a class="btn btn-send" href="${p.link}" target="_blank">Abrir WhatsApp</a>
      <button class="btn btn-done" onclick="markSent(${i})">Marcar enviado</button>` : ''}
    `;
    container.appendChild(card);
  });

  updateProgress();
}

function markSent(index) {
  const sent = getSent();
  if (!sent.includes(index)) {
    sent.push(index);
    saveSent(sent);
  }
  render();
}

render();
</script>
