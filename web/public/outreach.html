<html lang="es">

    <meta charset="UTF-8">

    <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
    body {
      min-height: 100vh;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e2e8f0;
      background: #0f172a;
    }
    .header {
      margin-bottom: 24px;
      text-align: center;
    }
    .header h1 {
      margin-bottom: 4px;
      font-size: 1.5rem;
      color: #22c55e;
    }
    .header p {
      font-size: 0.875rem;
      color: #94a3b8;
    }
    .progress {
      margin-bottom: 20px;
      font-size: 0.875rem;
      color: #94a3b8;
      text-align: center;
    }
    .progress-bar {
      height: 6px;
      margin-top: 8px;
      background: #1e293b;
      border-radius: 3px;
    }
    .progress-fill {
      height: 100%;
      background: #22c55e;
      border-radius: 3px;
      transition: width 0.3s;
    }
    .card {
      padding: 16px;
      margin-bottom: 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
    }
    .card.sent {
      border-color: #22c55e;
      opacity: 0.6;
    }
    .card .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .card .name {
      font-size: 1rem;
      font-weight: 600;
      color: #f1f5f9;
    }
    .card .vertical {
      padding: 2px 8px;
      font-size: 0.75rem;
      color: #94a3b8;
      background: #334155;
      border-radius: 9999px;
    }
    .card .location {
      margin-bottom: 8px;
      font-size: 0.8125rem;
      color: #64748b;
    }
    .card .notes {
      margin-bottom: 12px;
      font-size: 0.8125rem;
      color: #94a3b8;
    }
    .card .preview {
      max-height: 60px;
      margin-bottom: 12px;
      overflow: hidden;
      font-size: 0.75rem;
      line-height: 1.4;
      color: #475569;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      font-size: 0.9375rem;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      border: none;
      border-radius: 8px;
    }
    .btn-send {
      color: #052e16;
      background: #22c55e;
    }
    .btn-send:hover {
      background: #16a34a;
    }
    .btn-done {
      margin-top: 8px;
      color: #22c55e;
      background: #1e293b;
      border: 1px solid #22c55e;
    }
    .btn-done:hover {
      color: #052e16;
      background: #22c55e;
    }
    .status-badge {
      padding: 2px 8px;
      font-size: 0.75rem;
      border-radius: 9999px;
    }
    .status-pending {
      color: #fbbf24;
      background: #422006;
    }
    .status-sent {
      color: #22c55e;
      background: #052e16;
    }
    .tip {
      padding: 16px;
      margin-bottom: 20px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
    }
    .tip h3 {
      margin-bottom: 8px;
      font-size: 0.875rem;
      color: #fbbf24;
    }
    .tip ol {
      padding-left: 20px;
      font-size: 0.8125rem;
      line-height: 1.8;
      color: #94a3b8;
    }
    </style>
  </head>

        notes: "Listado en AllBiz, teléfono confirmado",
        link: "https://wa.me/528116208450?text=Hola!%20Soy%20[TU_NOMBRE]%20de%20Zenda.%20Barber%C3%ADas%20como%20Gentlemen%27s%20pierden%20clientes%20cada%20d%C3%ADa%20porque%20no%20pueden%20contestar%20WhatsApp%20mientras%20cortan%20el%20pelo.%0A%0AZenda%20responde%20por%20ti%20en%20segundos%2C%20agenda%20la%20cita%20y%20manda%20recordatorios%20%E2%80%94%20todo%20autom%C3%A1tico.%0A%0A14%20d%C3%ADas%20gratis%20%2B%2050%25%20de%20descuento%20para%20los%20primeros%2010%20negocios%20(~%24250%20MXN%2Fmes)%3A%20zenda.bot%2Ffounding",

      {

      },
    ];

    const STORAGE_KEY = "zenda-outreach-sent";

    function getSent() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function saveSent(sent) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sent));
    }

    function updateProgress() {
      const sent = getSent();
      const count = sent.length;
      document.getElementById("counter").textContent = count;
      document.getElementById("bar").style.width =
        `${(count / prospects.length) * 100}%`;
    }

    function render() {
      const sent = getSent();
      const container = document.getElementById("cards");
      container.innerHTML = "";

      prospects.forEach((p, i) => {
        const isSent = sent.includes(i);
        const card = document.createElement("div");
        card.className = `card${isSent ? " sent" : ""}`;
        card.innerHTML = `
          <div class="top">
            <span class="name">${i + 1}. ${p.name}</span>
            <span class="status-badge ${isSent ? "status-sent" : "status-pending"}">${isSent ? "Enviado" : "Pendiente"}</span>
          </div>
          <div class="location">${p.location}</div>
          <div class="notes">${p.vertical} — ${p.notes}</div>
          ${
            isSent
              ? ""
              : `<a class="btn btn-send" href="${p.link}" target="_blank">Abrir WhatsApp</a>
          <button class="btn btn-done" onclick="markSent(${i})">Marcar enviado</button>`
          }
        `;
        container.appendChild(card);
      });

      updateProgress();
    }

    function _markSent(index) {
      const sent = getSent();
      if (!sent.includes(index)) {
        sent.push(index);
        saveSent(sent);
      }
      render();
    }

    render();
    </script>
  </body>
</html>
