name: Build Desktop App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx turbo run build --filter=@zenda/app

      - name: Package Electron App
        run: cd app && npx electron-forge package

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zenda-${{ matrix.os }}
          path: app/out/
