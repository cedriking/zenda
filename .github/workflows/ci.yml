name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint (Biome)
        run: npm run lint:ci

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build dependencies
        run: npx turbo run build --filter=@zenda/shared --filter=@zenda/db

      - name: Type check all packages
        run: npx turbo run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: zenda
          POSTGRES_PASSWORD: zenda_test
          POSTGRES_DB: zenda_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zenda"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build dependencies
        run: npx turbo run build --filter=@zenda/shared --filter=@zenda/db

      - name: Run tests
        run: npx turbo run test
        env:
          DATABASE_URL: postgres://zenda:zenda_test@localhost:5432/zenda_test
          REDIS_URL: redis://localhost:6379

  build-api:
    name: Build API Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f api/Dockerfile .

  build-web:
    name: Build Web Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Build Web image
        run: docker build -f web/Dockerfile .
