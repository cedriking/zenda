name: Publish Desktop App

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            maker: dmg
          - os: windows-latest
            maker: squirrel
    runs-on: ${{ matrix.os }}
    env:
      HUSKY: 0
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install all dependencies
        run: npm ci

      - name: Build workspace packages
        run: npx turbo build --filter=@zenda/shared --filter=@zenda/db

      - name: Make and Publish (${{ matrix.maker }})
        working-directory: app
        env:
          S3_DOWNLOADS_ENDPOINT: ${{ secrets.S3_DOWNLOADS_ENDPOINT }}
          S3_DOWNLOADS_ACCESS_KEY_ID: ${{ secrets.S3_DOWNLOADS_ACCESS_KEY_ID }}
          S3_DOWNLOADS_SECRET_ACCESS_KEY: ${{ secrets.S3_DOWNLOADS_SECRET_ACCESS_KEY }}
          S3_DOWNLOADS_BUCKET: ${{ secrets.S3_DOWNLOADS_BUCKET }}
        run: npx electron-forge publish
