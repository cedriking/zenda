name: Publish Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(jq -r .version app/package.json)" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            maker: dmg
            platform: macos
            arch: arm64
            extension: .dmg
          - os: windows-latest
            maker: squirrel
            platform: win32
            arch: x64
            extension: .exe
    runs-on: ${{ matrix.os }}
    env:
      HUSKY: 0
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install all dependencies
        run: npm ci

      - name: Build workspace packages
        run: npx turbo build --filter=@zenda/shared --filter=@zenda/db

      - name: Make (${{ matrix.maker }})
        working-directory: app
        run: npx electron-forge make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: app/out/make/**/*
          retention-days: 1

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Upload artifacts to server
        env:
          UPLOAD_URL: ${{ secrets.UPLOAD_URL }}
          UPLOAD_SECRET: ${{ secrets.UPLOAD_SECRET }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          RELEASE_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Upload all artifact files
          MANIFEST_MACOS=""
          MANIFEST_WINDOWS=""

          for dir in artifacts/*/; do
            platform_arch=$(basename "$dir")
            for file in "$dir"*; do
              [ -f "$file" ] || continue
              filename=$(basename "$file")
              upload_path="updates/${platform_arch}/${filename}"

              echo "Uploading ${upload_path}..."
              curl -sf -X POST "${UPLOAD_URL}/api/upload" \
                -H "Authorization: Bearer ${UPLOAD_SECRET}" \
                -F "file=@${file}" \
                -F "path=${upload_path}" \
                || { echo "Upload failed for ${file}"; exit 1; }

              # Track for manifest
              if [[ "$filename" == *.dmg ]]; then
                MANIFEST_MACOS="${upload_path}"
              fi
              if [[ "$filename" == *.exe ]]; then
                MANIFEST_WINDOWS="${upload_path}"
              fi
            done
          done

          # Also check flat structure (some makers output differently)
          for file in artifacts/*; do
            [ -f "$file" ] || continue
            filename=$(basename "$file")
            case "$filename" in
              *.dmg)
                upload_path="updates/darwin-arm64/${filename}"
                MANIFEST_MACOS="${upload_path}"
                ;;
              *.exe)
                upload_path="updates/win32-x64/${filename}"
                MANIFEST_WINDOWS="${upload_path}"
                ;;
              *)
                continue
                ;;
            esac

            echo "Uploading ${upload_path}..."
            curl -sf -X POST "${UPLOAD_URL}/api/upload" \
              -H "Authorization: Bearer ${UPLOAD_SECRET}" \
              -F "file=@${file}" \
              -F "path=${upload_path}" \
              || { echo "Upload failed for ${file}"; exit 1; }
          done

          # Build and upload latest.json manifest
          node -e "
          const fs = require('fs');
          const manifest = {
            version: '${VERSION}',
            releaseDate: '${RELEASE_DATE}',
            platforms: {
              macos: '${MANIFEST_MACOS}' ? { filename: '${MANIFEST_MACOS}' } : null,
              windows: '${MANIFEST_WINDOWS}' ? { filename: '${MANIFEST_WINDOWS}' } : null
            }
          };
          fs.writeFileSync('latest.json', JSON.stringify(manifest, null, 2));
          console.log(JSON.stringify(manifest, null, 2));
          "

          curl -sf -X POST "${UPLOAD_URL}/api/upload" \
            -H "Authorization: Bearer ${UPLOAD_SECRET}" \
            -F "file=@latest.json" \
            -F "path=latest.json" \
            || { echo "Manifest upload failed"; exit 1; }

          echo "Release ${VERSION} published successfully!"
